<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miko · Setup</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#f7f6f2;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#111}
  .card{background:#fff;border:1px solid #e9e7df;border-radius:16px;padding:40px 44px;width:100%;max-width:440px;box-shadow:0 12px 32px rgba(0,0,0,.08)}
  h1{font-size:20px;font-weight:700;margin-bottom:6px}
  p{font-size:13px;color:#7a7670;margin-bottom:28px;line-height:1.6}
  button{width:100%;height:46px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
  button:hover{opacity:.85}
  button:disabled{opacity:.4;cursor:not-allowed}
  .log{margin-top:20px;background:#f7f6f2;border:1px solid #e9e7df;border-radius:8px;padding:14px 16px;font-size:12px;color:#4a4844;line-height:1.8;max-height:260px;overflow-y:auto;display:none}
  .ok{color:#059669;font-weight:600}
  .err{color:#dc2626;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <h1>Miko · Database Setup</h1>
  <p>Seeds 100 students into Firebase Firestore under <code>schools/demo-school/students/</code>.<br>Run this once before using the Schedular.</p>
  <button id="btn" onclick="seed()">Seed 100 Students</button>
  <div class="log" id="log"></div>
</div>

<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, writeBatch, getDocs, collection }
                            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:            "AIzaSyC-0kK1L9wVTDSfiQmBVTw6Ul1_jAKqDKM",
  authDomain:        "gujrat-project-6653d.firebaseapp.com",
  projectId:         "gujrat-project-6653d",
  storageBucket:     "gujrat-project-6653d.firebasestorage.app",
  messagingSenderId: "947525921677",
  appId:             "1:947525921677:web:b1933167feeccd9ac2ebc4"
});
const db = getFirestore(app);

const MALE = [
  'Aarav','Arjun','Dev','Krish','Rohan','Veer','Yash','Raj','Meet','Jay',
  'Dhruv','Karan','Harsh','Vivek','Pratik','Nikhil','Sachin','Mohit','Akash','Ravi',
  'Tejas','Parth','Neel','Om','Manthan','Kush','Shyam','Vijay','Suraj','Hemant',
  'Tarun','Varun','Lalit','Jignesh','Hitesh','Nilesh','Rupesh','Bhavesh','Rakesh','Naresh',
  'Dinesh','Mukesh','Gaurav','Ankit','Deepak','Amit','Rahul','Vikas','Sanjay','Dhruvil'
];
const FEMALE = [
  'Diya','Priya','Ananya','Mira','Kavya','Riya','Pooja','Neha','Swati','Divya',
  'Shruti','Anjali','Meera','Nisha','Komal','Hetal','Khushi','Jhanvi','Sonal','Kinjal',
  'Riddhi','Nidhi','Mansi','Bhoomi','Dhara','Foram','Gargi','Hinal','Isha','Janvi',
  'Krupa','Monal','Nikita','Payal','Rinal','Sejal','Urvi','Avni','Charmi','Drashti',
  'Ekta','Zalak','Bhumi','Grishma','Heena','Twinkle','Lata','Vini','Foram','Sneha'
];
const LAST = [
  'Patel','Shah','Mehta','Desai','Joshi','Modi','Trivedi','Dave','Pandya','Bhatt',
  'Shukla','Chauhan','Raval','Parmar','Solanki','Gohil','Thakkar','Dalal','Gandhi','Amin'
];
// L1=30%, L2=40%, L3=20%, L4=10%
const LEVELS = [
  'L1','L1','L1','L2','L2','L2','L2','L3','L3','L4'
];

function pick(arr){ return arr[Math.floor(Math.random() * arr.length)] }

function generate100() {
  const students = [];
  for (let i = 1; i <= 100; i++) {
    const gender  = i % 2 === 0 ? 'F' : 'M';
    const first   = pick(gender === 'M' ? MALE : FEMALE);
    const last    = pick(LAST);
    students.push({
      id:      `s${String(i).padStart(3,'0')}`,
      rollNo:  i,
      name:    `${first} ${last}`,
      gender,
      level:   pick(LEVELS),
      status:  'pending',
      timeSpentSeconds: 0
    });
  }
  return students;
}

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.seed = async function() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Seeding...';

  try {
    // Check if already seeded
    const existing = await getDocs(collection(db, 'schools', 'demo-school', 'students'));
    if (existing.size >= 100) {
      log(`Already seeded — ${existing.size} students found.`, 'ok');
      btn.textContent = '✅ Already done';
      return;
    }

    log('Generating 100 students...');
    const students = generate100();

    // Firestore batch limit = 500 ops — 100 students fits in one batch
    const batch = writeBatch(db);
    students.forEach(s => {
      batch.set(doc(db, 'schools', 'demo-school', 'students', s.id), s);
    });

    log('Writing to Firestore...');
    await batch.commit();

    log('─────────────────────────────');
    students.slice(0, 5).forEach(s => log(`  ${s.rollNo}. ${s.name} · ${s.level} · ${s.gender}`));
    log(`  ... and ${students.length - 5} more`);
    log('─────────────────────────────');
    log(`✅ Done — 100 students seeded successfully`, 'ok');

    btn.textContent = '✅ Seeded Successfully';

  } catch(err) {
    log(`Error: ${err.message}`, 'err');
    btn.textContent = 'Seed 100 Students';
    btn.disabled = false;
  }
};
</script>
</body>
</html>
