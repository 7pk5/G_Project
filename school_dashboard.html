<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Dashboard - GSEB Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f19;
  --surface:#111827;
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.15);
  --ink:#ffffff;
  --ink2:#9ca3af;
  --ink3:#6b7280;
  --primary:#6B58F8;
  --accent:#FF855F;
  --r:8px;--rl:12px;--rxl:16px;
  -webkit-font-smoothing:antialiased;
}
body{
  font-family:'Geist',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  font-size:14px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* NAV */
.nav{
  height:64px;
  background:rgba(17, 24, 39, 0.8);
  backdrop-filter: blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 32px;
  gap:16px;
  position:relative;
  z-index:50;
}
.nav-logo{
  font-family:'Instrument Serif',serif;
  font-size:22px;
  letter-spacing:-.02em;
  color:var(--ink);
}
.nav-div{width:1px;height:16px;background:var(--border2)}
.nav-tag{
  font-size:11px;
  color:var(--ink2);
  background:rgba(107, 88, 248, 0.15);
  border:1px solid rgba(107, 88, 248, 0.3);
  padding:2px 8px;
  border-radius:99px;
  font-weight:600;
}
.nav-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-home-btn {
  padding: 8px 18px;
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
  background: transparent;
  color: var(--ink2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  transition: all 0.15s;
}
.nav-home-btn:hover {
  background: rgba(255,255,255,0.05);
  color: var(--ink);
}

/* MAIN VIEWPORT */
.viewport {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: radial-gradient(circle at 50% 50%, #111827 0%, #0b0f19 100%);
}

/* Glow effects */
.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(107, 88, 248, 0.12) 0%, rgba(11, 15, 25, 0) 70%);
  pointer-events: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
}
.glow-accent {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255, 133, 95, 0.06) 0%, rgba(11, 15, 25, 0) 70%);
  pointer-events: none;
  top: 30%;
  left: 35%;
  z-index: 1;
}

/* DEVICE CONTAINER */
.device-container {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  animation: up .6s cubic-bezier(0.16, 1, 0.3, 1) both;
}
.brand-text {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.device-badge {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 10px;
  color: var(--ink2);
}

.iphone-16 {
  width: 360px;
  height: 760px;
  background: #000000;
  border-radius: 48px;
  position: relative;
  box-shadow: 
      0 0 0 4px #262930, 
      0 0 0 9px #090a0c, 
      0 30px 60px rgba(0, 0, 0, 0.8),
      0 0 100px rgba(107, 88, 248, 0.15);
  padding: 8px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.screen {
  width: 100%;
  height: 100%;
  background: #ffffff;
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  z-index: 2;
}
iframe {
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  overflow: hidden;
}
.dynamic-island {
  width: 98px;
  height: 25px;
  background: #000000;
  border-radius: 99px;
  position: absolute;
  top: 11px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  pointer-events: none;
}
.home-indicator {
  width: 120px;
  height: 4px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 99px;
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  pointer-events: none;
}

@keyframes up{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

  <header class="nav">
    <span class="nav-logo">📊 School Setup & Setup Planner</span>
    <div class="nav-div"></div>
    <span class="nav-tag">Live Dynamic Syncing SmartBoard</span>
    
    <div class="nav-actions">
      <a href="./index.html" class="nav-home-btn">← Back to Portal</a>
    </div>
  </header>

  <main class="viewport">
    <div class="glow"></div>
    <div class="glow-accent"></div>

    <div class="device-container">
      <div class="brand-text">
        <span>GSEB School Setup App</span>
        <span class="device-badge">iPhone 16 Mockup</span>
      </div>

      <div class="iphone-16">
        <!-- Dynamic Island -->
        <div class="dynamic-island"></div>
        
        <!-- App Screen -->
        <div class="screen">
          <iframe id="app-iframe" src="./teacher/index.html"></iframe>
        </div>

        <!-- iOS Home Bar Indicator -->
        <div class="home-indicator"></div>
      </div>
    </div>
  </main>

</body>
</html>
